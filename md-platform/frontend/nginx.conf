# MD Platform frontend — serves the SPA and reverse-proxies the API.
# Container listens on 80; docker-compose maps host 8888 -> 80.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream md_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Large MD/structure uploads (PDBQT/SDF/PDB and result downloads). Aligns
    # with MAX_UPLOAD_SIZE_GB on the backend; 0 disables nginx's own limit.
    client_max_body_size 0;

    # ── Server-Sent Events: /api/events/ ─────────────────────────────────────
    # SSE must stream unbuffered with a long-lived connection. Keep HTTP/1.1,
    # disable proxy/cache buffering, and use long read timeouts.
    location /api/events/ {
        proxy_pass http://md_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        gzip off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── WebSocket: /api/ws/ ──────────────────────────────────────────────────
    # Forward the Upgrade/Connection headers so the backend can complete the
    # handshake; disable buffering and use long timeouts for persistent sockets.
    location /api/ws/ {
        proxy_pass http://md_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Regular REST API: /api/ ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://md_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── SPA static assets + history-mode fallback ────────────────────────────
    # Hashed build assets get long-lived immutable caching.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Any other path resolves to a real file or falls back to index.html so the
    # client-side router (BrowserRouter) can handle deep links on reload.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
