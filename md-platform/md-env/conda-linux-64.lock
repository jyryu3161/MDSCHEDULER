# Explicit conda lock file (placeholder / disabled by default).
#
# This sentinel keeps the file present in the Docker build context so the
# md-env Dockerfile can COPY it unconditionally. While it contains only
# comments, the build falls back to the version-pinned environment.yml.
#
# To enable a fully transitively-reproducible build, replace this file with a
# real explicit lock generated by conda-lock (see md-env/environment.yml):
#
#   conda-lock lock -f md-env/environment.yml -p linux-64 \
#       --lockfile md-env/conda-lock.yml
#   conda-lock render -p linux-64 --kind explicit md-env/conda-lock.yml
#   mv conda-linux-64.lock md-env/conda-linux-64.lock
#
# A valid explicit lock begins with "@EXPLICIT" followed by fully-qualified
# package URLs (one per line). The Dockerfile detects a real lock by checking
# for a non-comment "@EXPLICIT" line; comment-only content uses the fallback.
